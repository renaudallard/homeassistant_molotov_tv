<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Molotov Custom Receiver</title>
    <!-- Official Receiver: https://chromecast.cloud-01.molotov.tv/ -->
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <!-- Cast Debug Logger -->
    <script src="//www.gstatic.com/cast/sdk/libs/devtools/debug_layer/caf_receiver_logger.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
        }
        cast-media-player {
            --advancement-background-color: rgba(0,0,0,0.8);
        }

        /* Control Menu Overlay */
        #control-menu {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 40px 20px 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
            transform: translateY(100%);
            transition: transform 0.3s ease-out;
            z-index: 1000;
        }
        #control-menu.visible {
            transform: translateY(0);
        }

        .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 25px;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-family: 'Roboto', sans-serif;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 100px;
        }
        .menu-item.selected {
            background: rgba(229, 9, 20, 0.9);
            transform: scale(1.1);
        }
        .menu-item .icon {
            font-size: 32px;
            margin-bottom: 8px;
        }
        .menu-item .label {
            font-size: 14px;
            opacity: 0.9;
        }

        /* Audio submenu */
        #audio-submenu {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0,0,0,0.95);
            border-radius: 8px;
            padding: 10px 0;
            min-width: 200px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s ease;
            z-index: 1001;
        }
        #audio-submenu.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) translateY(0);
        }
        .audio-option {
            padding: 12px 20px;
            color: #fff;
            font-family: 'Roboto', sans-serif;
            font-size: 16px;
        }
        .audio-option.selected {
            background: rgba(229, 9, 20, 0.9);
        }
        .audio-option.active::after {
            content: ' ✓';
            color: #4CAF50;
        }

        /* Hint overlay */
        #menu-hint {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: rgba(255,255,255,0.5);
            font-family: 'Roboto', sans-serif;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        #menu-hint.visible {
            opacity: 1;
        }

        /* Seek preview overlay */
        #seek-preview {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0,0,0,0.85);
            border-radius: 8px;
            padding: 14px 22px;
            min-width: 320px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            z-index: 1002;
            font-family: 'Roboto', sans-serif;
        }
        #seek-preview.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        #seek-preview-label {
            display: flex;
            justify-content: space-between;
            color: #fff;
            font-size: 18px;
            margin-bottom: 10px;
        }
        #seek-preview-delta {
            color: #e50914;
            font-weight: bold;
        }
        #seek-preview-track {
            height: 4px;
            background: rgba(255,255,255,0.25);
            border-radius: 2px;
            overflow: hidden;
        }
        #seek-preview-fill {
            height: 100%;
            width: 0%;
            background: #e50914;
            transition: width 0.1s linear;
        }
    </style>
</head>
<body>
    <cast-media-player></cast-media-player>

    <!-- Control Menu -->
    <div id="control-menu">
        <div class="menu-item" data-action="back">
            <span class="icon">⏪</span>
            <span class="label">-10s</span>
        </div>
        <div class="menu-item" data-action="forward">
            <span class="icon">⏩</span>
            <span class="label">+30s</span>
        </div>
        <div class="menu-item" data-action="restart">
            <span class="icon">↺</span>
            <span class="label">Restart</span>
        </div>
        <div class="menu-item" data-action="audio">
            <span class="icon">🔊</span>
            <span class="label">Audio</span>
        </div>
    </div>

    <!-- Audio Track Submenu -->
    <div id="audio-submenu"></div>

    <!-- Menu Hint -->
    <div id="menu-hint">Press ↓ for controls</div>

    <!-- Seek Preview -->
    <div id="seek-preview">
        <div id="seek-preview-label">
            <span id="seek-preview-time">0:00</span>
            <span id="seek-preview-delta"></span>
        </div>
        <div id="seek-preview-track">
            <div id="seek-preview-fill"></div>
        </div>
    </div>

    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();
        const castDebugLogger = cast.debug.CastDebugLogger.getInstance();

        // --- Menu State ---
        let menuVisible = false;
        let audioMenuVisible = false;
        let selectedIndex = 0;
        let audioSelectedIndex = 0;
        let menuItems = [];
        let audioTracks = [];
        let hideHintTimer = null;
        let hideMenuTimer = null;

        // Seek state
        const SEEK_STEP_BACK = -10;
        const SEEK_STEP_FWD = 30;
        const SEEK_COMMIT_DELAY = 400;
        const SEEK_PREVIEW_LINGER = 800;
        // Holding the key auto-repeats keydown; each repeat in the same
        // direction within the window grows the step, so a held button scrubs
        // faster the longer it is held (capped).
        const SEEK_REPEAT_WINDOW = 450;
        const SEEK_ACCEL_STEP = 0.6;
        const SEEK_MAX_MULTIPLIER = 12;
        let pendingSeekTime = null;
        let seekCommitTimer = null;
        let hideSeekPreviewTimer = null;
        let seekRepeat = 0;
        let seekDir = 0;
        let lastSeekAt = 0;

        // --- DOM Elements ---
        const controlMenu = document.getElementById('control-menu');
        const audioSubmenu = document.getElementById('audio-submenu');
        const menuHint = document.getElementById('menu-hint');
        const seekPreview = document.getElementById('seek-preview');
        const seekPreviewTime = document.getElementById('seek-preview-time');
        const seekPreviewDelta = document.getElementById('seek-preview-delta');
        const seekPreviewTrack = document.getElementById('seek-preview-track');
        const seekPreviewFill = document.getElementById('seek-preview-fill');

        // --- Initialize Menu Items ---
        function initMenu() {
            menuItems = document.querySelectorAll('.menu-item');
            updateMenuSelection();
        }

        // --- Menu Visibility ---
        function showMenu() {
            menuVisible = true;
            controlMenu.classList.add('visible');
            menuHint.classList.remove('visible');
            resetHideMenuTimer();
        }

        function hideMenu() {
            menuVisible = false;
            audioMenuVisible = false;
            controlMenu.classList.remove('visible');
            audioSubmenu.classList.remove('visible');
            clearTimeout(hideMenuTimer);
        }

        function toggleMenu() {
            if (menuVisible) {
                hideMenu();
            } else {
                showMenu();
            }
        }

        function resetHideMenuTimer() {
            clearTimeout(hideMenuTimer);
            hideMenuTimer = setTimeout(() => {
                if (menuVisible && !audioMenuVisible) {
                    hideMenu();
                }
            }, 5000);
        }

        // --- Menu Navigation ---
        function updateMenuSelection() {
            menuItems.forEach((item, index) => {
                item.classList.toggle('selected', index === selectedIndex);
            });
        }

        function navigateMenu(direction) {
            if (!menuVisible) return;
            resetHideMenuTimer();

            if (audioMenuVisible) {
                navigateAudioMenu(direction);
                return;
            }

            selectedIndex += direction;
            if (selectedIndex < 0) selectedIndex = menuItems.length - 1;
            if (selectedIndex >= menuItems.length) selectedIndex = 0;
            updateMenuSelection();
        }

        function activateMenuItem() {
            if (!menuVisible) return;
            resetHideMenuTimer();

            if (audioMenuVisible) {
                selectAudioTrack();
                return;
            }

            const action = menuItems[selectedIndex].dataset.action;
            executeAction(action);
        }

        // --- Actions ---
        function executeAction(action) {
            const currentTime = playerManager.getCurrentTimeSec();

            switch (action) {
                case 'back':
                    clampedSeek(currentTime + SEEK_STEP_BACK);
                    break;
                case 'forward':
                    clampedSeek(currentTime + SEEK_STEP_FWD);
                    break;
                case 'restart':
                    clampedSeek(0);
                    break;
                case 'audio':
                    showAudioMenu();
                    return; // Don't hide menu
            }

            // Brief feedback then hide
            setTimeout(hideMenu, 500);
        }

        // --- Seek Controls ---
        // Returns the seekable bounds {min, max} for the current media, or null
        // when nothing is loaded or a live stream exposes no timeshift window.
        // max is null when the upper bound is unknown (VOD without a duration).
        function getSeekBounds() {
            const mediaInfo = playerManager.getMediaInformation();
            if (!mediaInfo) return null;

            const messages = cast.framework.messages;
            if (mediaInfo.streamType === messages.StreamType.LIVE) {
                const range = playerManager.getLiveSeekableRange();
                if (range && typeof range.start === 'number'
                    && typeof range.end === 'number') {
                    return { min: range.start, max: range.end };
                }
                // Live stream without a seekable window: seeking not possible.
                return null;
            }

            const dur = playerManager.getDurationSec();
            if (!Number.isNaN(dur) && dur > 0) {
                return { min: 0, max: dur };
            }
            // VOD with unknown duration: clamp only at the start.
            return { min: 0, max: null };
        }

        function clampBounds(value, bounds) {
            let t = value;
            if (t < bounds.min) t = bounds.min;
            if (bounds.max !== null && t > bounds.max) t = bounds.max;
            return t;
        }

        // Absolute seek in seconds, clamped to the current media bounds.
        function clampedSeek(target) {
            const bounds = getSeekBounds();
            if (!bounds) return;
            playerManager.seek(clampBounds(target, bounds));
        }

        function formatTime(totalSec) {
            if (!Number.isFinite(totalSec) || totalSec < 0) totalSec = 0;
            totalSec = Math.floor(totalSec);
            const h = Math.floor(totalSec / 3600);
            const m = Math.floor((totalSec % 3600) / 60);
            const s = totalSec % 60;
            const mm = (h > 0 && m < 10) ? '0' + m : '' + m;
            const ss = s < 10 ? '0' + s : '' + s;
            return h > 0 ? (h + ':' + mm + ':' + ss) : (mm + ':' + ss);
        }

        function formatDelta(deltaSec) {
            const sign = deltaSec < 0 ? '-' : '+';
            return sign + formatTime(Math.abs(deltaSec));
        }

        function renderSeekPreview(target, bounds, speed) {
            const current = playerManager.getCurrentTimeSec();
            let deltaText = formatDelta(Math.round(target - current));
            if (speed && speed >= 2) {
                deltaText += '  ×' + Math.round(speed);
            }
            seekPreviewTime.textContent = formatTime(target);
            seekPreviewDelta.textContent = deltaText;

            if (bounds.max !== null && bounds.max > bounds.min) {
                const frac = (target - bounds.min) / (bounds.max - bounds.min);
                seekPreviewFill.style.width =
                    (Math.max(0, Math.min(1, frac)) * 100) + '%';
                seekPreviewTrack.style.visibility = 'visible';
            } else {
                seekPreviewTrack.style.visibility = 'hidden';
            }
        }

        function showSeekPreview() {
            clearTimeout(hideSeekPreviewTimer);
            seekPreview.classList.add('visible');
        }

        function hideSeekPreview() {
            seekPreview.classList.remove('visible');
        }

        // Accumulate a relative seek and arm the debounce timer. Repeated key
        // presses build up a single target so the stream is only seeked once.
        function stepSeek(deltaSec) {
            if (menuVisible || audioMenuVisible) return;

            const bounds = getSeekBounds();
            if (!bounds) return;

            // Accelerate while the key is held: count consecutive presses in
            // the same direction within the repeat window and grow the step.
            const now = Date.now();
            const direction = deltaSec < 0 ? -1 : 1;
            if (direction === seekDir && (now - lastSeekAt) < SEEK_REPEAT_WINDOW) {
                seekRepeat++;
            } else {
                seekRepeat = 0;
            }
            seekDir = direction;
            lastSeekAt = now;

            const multiplier = Math.min(
                SEEK_MAX_MULTIPLIER, 1 + seekRepeat * SEEK_ACCEL_STEP
            );

            const base = (pendingSeekTime !== null)
                ? pendingSeekTime
                : playerManager.getCurrentTimeSec();
            pendingSeekTime = clampBounds(base + deltaSec * multiplier, bounds);

            renderSeekPreview(pendingSeekTime, bounds, multiplier);
            showSeekPreview();

            clearTimeout(seekCommitTimer);
            seekCommitTimer = setTimeout(commitSeek, SEEK_COMMIT_DELAY);
        }

        // Issue the accumulated seek as a single clamped seek operation.
        function doSeekCommit() {
            clearTimeout(seekCommitTimer);
            seekCommitTimer = null;
            seekRepeat = 0;
            seekDir = 0;
            if (pendingSeekTime !== null) {
                clampedSeek(pendingSeekTime);
                pendingSeekTime = null;
            }
        }

        function commitSeek() {
            doSeekCommit();
            // Keep the preview briefly so the landing point stays visible.
            clearTimeout(hideSeekPreviewTimer);
            hideSeekPreviewTimer = setTimeout(hideSeekPreview, SEEK_PREVIEW_LINGER);
        }

        // Commit any pending seek immediately and clear the preview, used when
        // the control menu takes over the LEFT/RIGHT keys.
        function flushPendingSeek() {
            doSeekCommit();
            hideSeekPreview();
        }

        // --- Audio Track Menu ---
        function showAudioMenu() {
            const tracks = playerManager.getTracks();
            if (!tracks) return;

            audioTracks = tracks.filter(t => t.type === 'AUDIO');
            if (audioTracks.length === 0) return;

            const stats = playerManager.getStats();
            const activeIds = stats ? stats.currentTrackIds : [];

            // Build audio menu
            audioSubmenu.innerHTML = '';
            audioTracks.forEach((track, index) => {
                const div = document.createElement('div');
                div.className = 'audio-option';

                // Determine label
                let label = track.name || track.language || 'Track ' + (index + 1);
                if (track.language) {
                    const langNames = {
                        'fr': 'Français', 'fra': 'Français', 'fre': 'Français',
                        'en': 'English', 'eng': 'English',
                        'de': 'Deutsch', 'deu': 'Deutsch', 'ger': 'Deutsch',
                        'es': 'Español', 'spa': 'Español',
                        'it': 'Italiano', 'ita': 'Italiano',
                        'qaa': 'Original'
                    };
                    label = langNames[track.language] || track.language.toUpperCase();
                }

                div.textContent = label;
                div.dataset.trackId = track.trackId;

                if (activeIds && activeIds.includes(track.trackId)) {
                    div.classList.add('active');
                    audioSelectedIndex = index;
                }

                audioSubmenu.appendChild(div);
            });

            audioMenuVisible = true;
            audioSubmenu.classList.add('visible');
            updateAudioSelection();
        }

        function hideAudioMenu() {
            audioMenuVisible = false;
            audioSubmenu.classList.remove('visible');
        }

        function navigateAudioMenu(direction) {
            audioSelectedIndex += direction;
            if (audioSelectedIndex < 0) audioSelectedIndex = audioTracks.length - 1;
            if (audioSelectedIndex >= audioTracks.length) audioSelectedIndex = 0;
            updateAudioSelection();
        }

        function updateAudioSelection() {
            const options = audioSubmenu.querySelectorAll('.audio-option');
            options.forEach((opt, index) => {
                opt.classList.toggle('selected', index === audioSelectedIndex);
            });
        }

        function selectAudioTrack() {
            if (audioTracks[audioSelectedIndex]) {
                const trackId = audioTracks[audioSelectedIndex].trackId;
                playerManager.setActiveTrackIds([trackId]);
                console.log('[Molotov] Audio track changed to:', trackId);
            }
            hideAudioMenu();
            setTimeout(hideMenu, 500);
        }

        // --- Key Event Handling ---
        // Cast remotes dispatch KeyboardEvent.key ('ArrowLeft', 'BrowserBack',
        // ...); older webviews only populate the legacy keyCode. Accept both.
        function normalizeKey(event) {
            switch (event.key) {
                case 'ArrowUp': return 'up';
                case 'ArrowDown': return 'down';
                case 'ArrowLeft': return 'left';
                case 'ArrowRight': return 'right';
                case 'Enter': return 'enter';
                case 'Back':
                case 'BrowserBack':
                case 'GoBack':
                case 'Escape':
                    return 'back';
            }
            switch (event.keyCode) {
                case 38: return 'up';
                case 40: return 'down';
                case 37: return 'left';
                case 39: return 'right';
                case 13: return 'enter';
                case 8:
                case 27:
                    return 'back';
            }
            return null;
        }

        function handleKeyDown(event) {
            const action = normalizeKey(event);
            if (!action) return;

            switch (action) {
                case 'down':
                    if (!menuVisible) {
                        flushPendingSeek();
                        showMenu();
                    } else if (audioMenuVisible) {
                        navigateAudioMenu(1);
                    }
                    event.preventDefault();
                    break;

                case 'up':
                    if (audioMenuVisible) {
                        navigateAudioMenu(-1);
                    } else if (menuVisible) {
                        hideMenu();
                    }
                    event.preventDefault();
                    break;

                case 'left':
                    if (menuVisible && !audioMenuVisible) {
                        navigateMenu(-1);
                    } else if (!menuVisible) {
                        stepSeek(SEEK_STEP_BACK);
                    }
                    event.preventDefault();
                    break;

                case 'right':
                    if (menuVisible && !audioMenuVisible) {
                        navigateMenu(1);
                    } else if (!menuVisible) {
                        stepSeek(SEEK_STEP_FWD);
                    }
                    event.preventDefault();
                    break;

                case 'enter':
                    if (menuVisible) {
                        activateMenuItem();
                    } else {
                        flushPendingSeek();
                        showMenu();
                    }
                    event.preventDefault();
                    break;

                case 'back':
                    if (audioMenuVisible) {
                        hideAudioMenu();
                    } else if (menuVisible) {
                        hideMenu();
                    }
                    event.preventDefault();
                    break;
            }
        }

        document.addEventListener('keydown', handleKeyDown);

        // --- Track Selection Logic ---
        function forceFrenchAudio() {
            const tracks = playerManager.getTracks();
            const stats = playerManager.getStats();
            const activeIds = stats ? stats.currentTrackIds : [];

            if (!tracks || tracks.length === 0) return;

            const audioTracksLocal = tracks.filter(t => t.type === 'AUDIO');

            // 1. Check for explicit preference from Molotov API (passed via customData)
            const mediaInfo = playerManager.getMediaInformation();
            const customData = mediaInfo ? mediaInfo.customData : null;

            if (customData && customData.selected_track && customData.selected_track.track_audio) {
                const prefLang = customData.selected_track.track_audio;
                const prefTrack = audioTracksLocal.find(t => t.language === prefLang);
                if (prefTrack) {
                    if (!activeIds || !activeIds.includes(prefTrack.trackId)) {
                        console.log("[Molotov] Switching to API preference:", prefLang);
                        playerManager.setActiveTrackIds([prefTrack.trackId]);
                    }
                    return;
                }
            }

            // 2. Fallback: If current track is English/Original, look for French
            let activeLang = 'unknown';
            audioTracksLocal.forEach(t => {
                if (activeIds && activeIds.includes(t.trackId)) activeLang = t.language;
            });

            if (activeLang === 'en' || activeLang === 'eng' || activeLang === 'qaa' || activeLang === 'unknown') {
                const target = audioTracksLocal.find(t =>
                    t.language === 'fr' ||
                    t.language === 'fra' ||
                    t.language === 'fre' ||
                    (t.label && t.label.toLowerCase().includes('franç')) ||
                    (t.name && t.name.toLowerCase().includes('franç'))
                ) || audioTracksLocal.find(t => t.language !== 'en' && t.language !== 'eng' && t.language !== 'qaa');

                if (target && (!activeIds || !activeIds.includes(target.trackId))) {
                    console.log("[Molotov] Fallback switch to:", target.language);
                    playerManager.setActiveTrackIds([target.trackId]);
                }
            }
        }

        // --- Event Listeners ---
        playerManager.addEventListener(cast.framework.events.EventType.PLAYER_LOAD_COMPLETE, () => {
            setTimeout(forceFrenchAudio, 1000);
            // Show hint briefly
            menuHint.classList.add('visible');
            hideHintTimer = setTimeout(() => {
                menuHint.classList.remove('visible');
            }, 5000);
        });

        // Handle tracks appearing late
        playerManager.addEventListener(cast.framework.events.EventType.TRACKS_CHANGED, forceFrenchAudio);

        // --- Message Interceptors ---
        playerManager.setMessageInterceptor(
            cast.framework.messages.MessageType.LOAD,
            loadRequestData => {
                const media = loadRequestData.media;
                const customData = media.customData || {};

                if (customData.stream_url) media.contentId = customData.stream_url;
                if (customData.content_type) media.contentType = customData.content_type;

                if (customData.license_url && customData.drm_token) {
                    const playbackConfig = (Object.assign(new cast.framework.PlaybackConfig(), playerManager.getPlaybackConfig()));
                    playbackConfig.protectionSystem = cast.framework.ContentProtection.WIDEVINE;

                    playbackConfig.shakaConfiguration = {
                        streaming: {
                            bufferingGoal: 30,
                            rebufferingGoal: 15,
                            bufferBehind: 30,
                            alwaysStreamText: true
                        },
                        preferredAudioLanguage: 'fra'
                    };

                    let licenseUrl = customData.license_url;
                    if (customData.asset_id) {
                        const separator = licenseUrl.includes('?') ? '&' : '?';
                        licenseUrl += separator + 'assetId=' + customData.asset_id;
                    }
                    playbackConfig.licenseUrl = licenseUrl;

                    playbackConfig.licenseRequestHandler = requestInfo => {
                        requestInfo.withCredentials = true;
                        requestInfo.headers['x-dt-auth-token'] = customData.drm_token;
                    };

                    playbackConfig.licenseHandler = data => {
                        try {
                            const str = new TextDecoder().decode(data);
                            const json = JSON.parse(str);
                            if (json.license) {
                                const binaryString = atob(json.license);
                                const bytes = new Uint8Array(binaryString.length);
                                for (let i = 0; i < binaryString.length; i++) {
                                    bytes[i] = binaryString.charCodeAt(i);
                                }
                                return bytes;
                            }
                        } catch (e) {}
                        return data;
                    };

                    playerManager.setPlaybackConfig(playbackConfig);
                }
                return loadRequestData;
            }
        );

        // --- Initialize ---
        initMenu();

        // --- Start Receiver ---
        const options = new cast.framework.CastReceiverOptions();
        options.supportedCommands = cast.framework.messages.Command.ALL_BASIC_COMMANDS |
                                    cast.framework.messages.Command.EDIT_TRACKS |
                                    cast.framework.messages.Command.SEEK;

        context.start(options);
    </script>
</body>
</html>
