name: Release on version bump

on:
  push:
    branches:
      - main
    paths:
      - 'custom_components/molotov_tv/manifest.json'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for version change
        id: version
        run: |
          new=$(jq -r .version custom_components/molotov_tv/manifest.json)
          old=$(git show HEAD~1:custom_components/molotov_tv/manifest.json | jq -r .version)
          echo "old=$old"
          echo "new=$new"
          if [ "$new" != "$old" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "tag=v$new" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.version.outputs.changed == 'true'
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create zip archive
        if: steps.version.outputs.changed == 'true'
        run: |
          cd custom_components/molotov_tv
          zip -r ../../molotov_tv.zip .

      - name: Create Release
        if: steps.version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: molotov_tv.zip
          generate_release_notes: true
